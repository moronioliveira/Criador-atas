<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criador de atas</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container mensal">
        
        <table id="tabela-escala" class="tabela">
           
        </table>

        <!-- Modal Flutuante para Edição de Texto -->
<div id="modal-container" class="modal-container">
    <div class="modal-content">
        <h3>Editar Conteúdo</h3>
        <textarea id="modal-textarea" rows="8" placeholder="Digite o texto aqui..."></textarea>
        <div class="modal-buttons">
            <button id="btn-cancelar" type="button" class="btn-secundario">Cancelar</button>
            <button id="btn-salvar" type="button" class="btn-primario">Salvar</button>
        </div>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
